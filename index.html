<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Personal Portfolio - Tishan Nilusha</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:#071026;
  --card: radial-gradient(circle, #0a1a2e 0%, #071026 100%);
  --accent:#7c3aed;
  --muted:#9aa4b2;
  --glass: rgba(255,255,255,0.03);
  --text:#e6eef6;
}

body.light {
  --bg:#f7f8fb;
  --card: radial-gradient(circle, #ffffff 0%, #e6e9ef 100%);
  --accent:#7c3aed;
  --muted:#555b65;
  --glass: rgba(0,0,0,0.05);
  --text:#0f172a;
}

* { box-sizing: border-box; }
html, body {
  margin:0; padding:0; font-family:'Inter', sans-serif;
  min-height:100%; overflow:hidden; color:var(--text);
  background:var(--bg);
  transition: background 0.8s, color 0.8s;
}

/* Video background */
#bgVideo {
  position:fixed; top:0; left:0; width:100%; height:100%;
  object-fit:cover; z-index:0;
  pointer-events:none;
  filter: brightness(0.6) contrast(1.1);
}

/* Overlay */
.overlay { position:fixed; inset:0; background: rgba(0,0,0,0.35); z-index:1; pointer-events:none; }

.container { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; position:relative; z-index:2; }

.card {
  background:var(--card); padding:28px; border-radius:14px; text-align:center;
  width:100%; max-width:400px;
  box-shadow:0 10px 40px rgba(2,6,23,0.6),0 0 20px rgba(124,58,237,0.4);
  backdrop-filter:blur(6px); transition: all 0.3s ease;
}

.avatar {
  width:140px; height:140px; margin:0 auto 14px; border-radius:14px; overflow:hidden;
  background:linear-gradient(135deg,#0ea5a5,#6366f1);
  animation: pulse 2s infinite;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.avatar:hover { transform: rotateY(15deg) rotateX(10deg) scale(1.05); box-shadow:0 0 40px rgba(124,58,237,0.9); }
@keyframes pulse { 0%,100%{ box-shadow:0 0 15px rgba(124,58,237,0.4); transform:scale(1);} 50%{ box-shadow:0 0 30px rgba(124,58,237,0.8); transform:scale(1.05);} }
.avatar img { width:100%; height:100%; object-fit:cover; }

h3 { margin:6px 0; font-size:20px; }
.role { font-size:14px; color:var(--muted); height:20px; margin-bottom:10px; }
.intro { font-size:14px; color:var(--muted); line-height:1.5; margin-bottom:14px; min-height:60px; }

.social-buttons { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin-top:12px; }
.social-buttons a {
  width:40px; height:40px; display:flex; justify-content:center; align-items:center;
  border-radius:50%; background:var(--glass); color:var(--text); font-size:18px; text-decoration:none;
  transition: all 0.3s ease, transform 0.3s ease; box-shadow:0 2px 14px rgba(0,0,0,0.35);
}
.social-buttons a:hover {
  background:var(--accent);
  color:#fff;
  transform: scale(1.15);
  box-shadow:0 0 16px var(--accent);
}

footer { text-align:center; margin-top:16px; font-size:12px; color:var(--muted); }
.theme-toggle { position:fixed; top:16px; right:16px; background:var(--glass); color:var(--text);
  border:none; border-radius:50%; width:40px; height:40px; display:flex; justify-content:center;
  align-items:center; cursor:pointer; z-index:3;
}

/* Mobile optimization: card slightly lower on screen */
@media (max-width:480px){
  html, body { min-height:100vh; overflow:auto; font-size:14px; }

  #bgVideo { object-fit:cover; }
  .overlay { inset:0; }

  .container { 
    flex-direction:column; 
    justify-content:flex-start; 
    align-items:center; 
    padding:15px; 
    padding-top:60vh; /* roughly center + lower */
    transform: translateY(-50px); /* tweak for visual balance */
  }

  .card { 
    padding:18px; 
    max-width:300px; 
    width:90%; 
    box-shadow:0 6px 25px rgba(2,6,23,0.5),0 0 10px rgba(124,58,237,0.3); 
  }

  .avatar { width:90px; height:90px; margin-bottom:12px; }

  h3 { font-size:17px; margin-bottom:4px; }
  .role { font-size:12px; height:auto; margin-bottom:6px; }
  .intro { font-size:13px; line-height:1.5; min-height:auto; white-space:pre-wrap; word-wrap:break-word; margin-bottom:10px; }

  .social-buttons { gap:10px; flex-wrap:wrap; justify-content:center; }
  .social-buttons a {
    width:38px; height:38px; font-size:16px; opacity:0; transform: translateY(8px) scale(0.9); animation: slideIn 0.5s forwards;
  }
  .social-buttons a:nth-child(1){ animation-delay:0.1s; }
  .social-buttons a:nth-child(2){ animation-delay:0.2s; }
  .social-buttons a:nth-child(3){ animation-delay:0.3s; }
  .social-buttons a:nth-child(4){ animation-delay:0.4s; }

  .theme-toggle { width:34px; height:34px; top:10px; right:10px; }
  footer { font-size:11px; margin-top:12px; }

  @keyframes slideIn { to { opacity:1; transform: translateY(0) scale(1); } }
}
</style>
</head>
<body>

<video id="bgVideo" autoplay loop muted>
  <source src="cyber_tech_loop.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>

<audio id="bgSound" loop>
  <source src="cyber_tech_sound.mp3" type="audio/mpeg">
  Your browser does not support audio.
</audio>

<div class="overlay"></div>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>

<div class="container">
  <div class="card">
    <div class="avatar">
      <img src="279746814_379316550918925_8872587971824853666_n.jpg" alt="Tishan Nilusha">
    </div>
    <h3>Tishan Nilusha</h3>
    <div class="role"><span id="typedRole"></span></div>
    <p class="intro" id="typedIntro"></p>
    <div class="social-buttons">
      <a href="https://github.com/tishannilusha07" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://linkedin.com/in/tishan-nilusha-94655138a" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="mailto:tishannilusha.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
      <a href="https://x.com/tishannilusha07" target="_blank" aria-label="X"><i class="fab fa-x-twitter"></i></a>
    </div>
    <footer>© <span id="year"></span> TISHAN NILUSHA — Built with HTML & CSS </footer>
  </div>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// Theme Toggle
const toggleBtn = document.getElementById('themeToggle'), icon = toggleBtn.querySelector('i');
if(localStorage.getItem('theme')==='light'){document.body.classList.add('light');icon.classList.replace('fa-moon','fa-sun');}
toggleBtn.addEventListener('click', ()=>{
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  icon.classList.toggle('fa-sun',isLight); icon.classList.toggle('fa-moon',!isLight);
  localStorage.setItem('theme',isLight?'light':'dark');
});

// Typed Intro
const introText = "Hey! I’m Tishan Nilusha – a student diving deep into Cyber Security, Networking, and Coding. I thrive on exploring how systems tick, securing digital landscapes, and crafting smart, efficient solutions. Always learning, always experimenting – turning curiosity into real-world projects.";
let i=0; const typedIntro=document.getElementById('typedIntro');
function typeWriter(){ if(i<introText.length){ typedIntro.innerHTML+=introText.charAt(i); i++; setTimeout(typeWriter,30); } }
typeWriter();

// Hacker Roles
const roles=["Cyber Security","Networking","Coding"];
let roleIndex=0;
const typedRole=document.getElementById('typedRole');
function shuffleText(text){ const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&@"; return text.split("").map(c=>(c===" "? " " : chars[Math.floor(Math.random()*chars.length)])).join(""); }
function animateRole(){ let steps=0; const role=roles[roleIndex]; const interval=setInterval(()=>{ typedRole.textContent=shuffleText(role); steps++; if(steps>10){ typedRole.textContent=role; clearInterval(interval); roleIndex=(roleIndex+1)%roles.length; setTimeout(animateRole,1500);} },80); }
animateRole();

// Sound Control
const bgSound = document.getElementById('bgSound');
document.body.addEventListener('click', ()=>{
  if(bgSound.paused){ bgSound.play().catch(()=>{}); }
});
</script>
</body>
</html>
